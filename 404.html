    <style>
      #app-loader {
        position: fixed; inset: 0;
        z-index: 9999;
        background: var(--bg, #02050a);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      #app-loader span {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: #38bdf8;
        animation: loader-bounce .8s infinite ease-in-out;
      }
      #app-loader span:nth-child(2) { animation-delay: .15s; }
      #app-loader span:nth-child(3) { animation-delay: .3s; }
      @keyframes loader-bounce {
        0%,100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-14px); opacity: 1; }
      }
